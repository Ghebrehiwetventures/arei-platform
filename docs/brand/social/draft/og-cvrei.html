<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CVREI OG Image · 1200 × 630</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 48px 32px;
    }
    svg { display: block; max-width: 100%; height: auto; }
  </style>
</head>
<body>
  <svg viewBox="0 0 1200 630" width="1200" height="630"
       xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto;">

    <!-- Background: ink -->
    <rect width="1200" height="630" fill="#0a0a0a"/>

    <!-- D-Layers mark — from docs/brand/assets/d-layers-mark.svg, white on ink -->
    <g transform="translate(72, 44) scale(2.5)"
       fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linecap="square">
      <rect x="3"   y="3"   width="14" height="14"/>
      <rect x="6.5" y="6.5" width="14" height="14"/>
      <rect x="10"  y="10"  width="9"  height="9" fill="#ffffff" stroke="none"/>
    </g>

    <!-- AREI label -->
    <text x="148" y="79"
          font-family="'IBM Plex Mono', monospace"
          font-size="14" font-weight="500"
          fill="#ffffff"
          letter-spacing="2.2">AREI</text>

    <!-- Hero — site name at H1 scale, bone -->
    <text x="72" y="284"
          font-family="'IBM Plex Mono', monospace"
          font-size="38" font-weight="400"
          fill="#f2f0ec"
          letter-spacing="-0.76">Cape Verde Real Estate Index</text>

    <!-- Sub line — sage -->
    <text x="72" y="334"
          font-family="'IBM Plex Mono', monospace"
          font-size="38" font-weight="400"
          fill="#8ecfbf"
          letter-spacing="-0.76">Structured property listing data.</text>

    <!-- URL — bottom-left, gray -->
    <text x="72" y="590"
          font-family="'IBM Plex Mono', monospace"
          font-size="11" font-weight="400"
          fill="#888888">capeverderealestateindex.com</text>

    <!-- Parent brand — bottom-right, gray -->
    <text text-anchor="end" x="1128" y="590"
          font-family="'IBM Plex Mono', monospace"
          font-size="11" font-weight="500"
          fill="#888888"
          letter-spacing="1.76">AREI</text>

  </svg>
</body>
</html>
