<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AREI X Banner · Direction C</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 48px 32px;
    }
    svg { display: block; max-width: 100%; height: auto; }
  </style>
</head>
<body>
  <svg viewBox="0 0 1500 500" width="1500" height="500"
       xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto;">

    <rect width="1500" height="500" fill="#0a0a0a"/>

    <!-- D-Layers mark — geometry from docs/brand/assets/d-layers-mark.svg -->
    <g transform="translate(88, 40) scale(3)"
       fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linecap="square">
      <rect x="3"   y="3"   width="14" height="14"/>
      <rect x="6.5" y="6.5" width="14" height="14"/>
      <rect x="10"  y="10"  width="9"  height="9" fill="#ffffff" stroke="none"/>
    </g>

    <!-- AREI label — vertically centred on mark (mark centre y = 40 + 36 = 76) -->
    <text x="178" y="82"
          font-family="'IBM Plex Mono', monospace"
          font-size="15" font-weight="500"
          fill="#ffffff"
          letter-spacing="2.4">AREI</text>

    <!-- Hero line 1 — bone -->
    <text x="88" y="230"
          font-family="'IBM Plex Mono', monospace"
          font-size="40" font-weight="400"
          fill="#f2f0ec"
          letter-spacing="-0.8">Africa&#x2019;s property data is everywhere.</text>

    <!-- Hero line 2 — sage -->
    <text x="88" y="282"
          font-family="'IBM Plex Mono', monospace"
          font-size="40" font-weight="400"
          fill="#8ecfbf"
          letter-spacing="-0.8">We bring it together.</text>

    <!-- Market identifier — bottom-right, very small -->
    <text text-anchor="end" x="1412" y="456"
          font-family="'IBM Plex Mono', monospace"
          font-size="11" font-weight="500"
          fill="#8ecfbf"
          letter-spacing="1.76">MARKET 01 · CAPE VERDE</text>

  </svg>
</body>
</html>
