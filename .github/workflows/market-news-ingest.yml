name: Market News Ingest

on:
  schedule:
    - cron: "0 6,14,20 * * *"   # 06:00, 14:00, 20:00 UTC — morning, midday, evening
  workflow_dispatch:               # manual trigger from GitHub Actions UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Enrichment is handled automatically by the Vercel cron
      # (api/enrich-pending-cron), which runs where OPENAI_API_KEY lives.
      # Ingest only inserts candidates here (no key required on Actions).
      - name: Ingest market news candidates
        run: npx ts-node --transpile-only scripts/ingest_market_news.ts --commit
