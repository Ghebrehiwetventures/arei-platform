# ============================================
# GENERIC CONFIG-DRIVEN SOURCE DEFINITIONS
# ============================================
# Adding a new source = add config here, NO code changes needed
# All pagination, selectors, and behavior defined in config
# ============================================

sources:
  # ============================================
  # STUB SOURCES (for testing)
  # ============================================
  - id: cv_source_1
    name: "Imobiliaria Praia"
    url: https://example-cv.com/praia
    type: stub
    selectors:
      listing: ".property-card"
      title: ".title"
      price: ".price"
      image: "img.main"

  - id: cv_source_2
    name: "Mindelo Properties"
    url: https://example-cv.com/mindelo
    type: stub
    selectors:
      listing: ".listing"
      title: "h2"
      price: ".value"
      image: ".photo img"

  # ============================================
  # TERRA CABO VERDE - Full Config Example
  # ============================================
  - id: cv_terracaboverde
    name: "Terra Cabo Verde"
    url: https://terracaboverde.com/properties/
    type: html
    lifecycleOverride: IN

    # CMS type for selector fallbacks (auto-detected if not specified)
    cms_type: elementor

    # Fetch method: http or headless (Puppeteer for JS-rendered)
    fetch_method: http

    # Pagination - explicit query_param (auto-detect failed with Elementor widget ID)
    # The site uses ?e-page-{widgetId}=N format (6 pages total as of Feb 2026)
    pagination:
      type: query_param
      param: "e-page-d1d3a65"
      start: 1
      first_no_param: true

    # Rate limiting
    delay_ms: 2500
    jitter_ms: 1000
    max_items: 200
    max_pages: 20
    stop_condition: empty_listings

    # Selectors - DOM analysis Jan 2026
    # Structure: .e-loop-item > a#card-prop > [h2:location, h3:title, h2:price, ...]
    selectors:
      listing: ".e-loop-item, [class*='e-loop-item']"
      link: "a#card-prop, a[href*='/properties/']"
      title: "h3.elementor-heading-title"
      price: "h2.elementor-heading-title"   # Code extracts text containing €
      location: "h2.elementor-heading-title:first-of-type"
      image: "img, [style*='background-image']"

    # URL validation
    reject_url_patterns:
      - "\\?e-page-"        # Reject pagination query params
      - "/properties/$"     # Reject bare category URL
      - "/page/"            # Reject WP-style pagination

    min_path_segments: 2    # Must have /properties/slug (2 segments)

    # Price format (European: 130.000 = 130,000)
    price_format:
      currency_symbol: "€"
      thousands_separator: "."
      decimal_separator: ","
      multiplier: 1

    # Location patterns (uses locations.yml if not specified)
    # location_patterns: []  # Auto-loaded from markets/cv/locations.yml

    # ID prefix for generated IDs
    id_prefix: "tcv"

    # Detail enrichment config (config-driven, no plugin needed!)
    detail:
      enabled: true
      policy: always        # always, on_violation, never
      delay_ms: 2500
      selectors:
        description: "h2:contains('Description') + .elementor-widget-text-editor, .elementor-widget-text-editor p"
        images: "#prop-gallery .swiper-slide img, .elementor-image-carousel img, .swiper-slide a[href*='.jpg']"
        # bedrooms/bathrooms extracted via spec_patterns below
      spec_patterns:
        bedrooms:
          - "(\\d+)\\s*(?:Bedrooms?|Beds?|Quartos?|Chambres?)"
          - "(?:Bedrooms?|Beds?|Quartos?)\\s*[:\\-]?\\s*(\\d+)"
          - "\\bT(\\d+)\\b"                                    # CV standard: T2 = 2 bedrooms
          - "(?:T|Tipologia)\\s*(\\d+)"                        # "Tipologia 2"
          - "(\\d+)\\s*(?:dorm|assoalhada)"                    # Portuguese variants
        bathrooms:
          - "(\\d+)\\s*(?:Bathrooms?|Baths?|Banheiros?|Casas?\\s*de\\s*banho)"
          - "(?:Bathrooms?|Baths?|Banheiros?)\\s*[:\\-]?\\s*(\\d+)"
        parking:
          - "(\\d+)\\s*(?:Parking|Garage|Vagas?|Estacionamento)"
        area:
          - "(\\d+(?:[.,]\\d+)?)\\s*(?:m[²2]|sqm|sq\\.?\\s*m|metros?\\s*quadrados?)"
          - "(?:area|size|superf[ií]cie|[aá]rea)\\s*[:\\-]?\\s*(\\d+(?:[.,]\\d+)?)\\s*(?:m[²2]|sqm|sq|$)"
      amenity_keywords:
        pool: ["pool", "piscina", "swimming"]
        sea_view: ["sea view", "vista mar", "ocean view"]
        balcony: ["balcony", "varanda"]
        garden: ["garden", "jardim"]
        air_conditioning: ["air conditioning", "ar condicionado", "a/c"]
        terrace: ["terrace", "terraço"]
        security: ["security", "segurança", "24h"]

  # ============================================
  # SIMPLY CAPE VERDE (Houzez AJAX load-more)
  # ============================================
  - id: cv_simplycapeverde
    name: "Simply Cape Verde"
    url: https://simplycapeverde.com/
    type: html
    lifecycleOverride: IN
    fetch_method: http   # AJAX POST uses plain fetch, no headless needed for listings

    # Houzez AJAX load-more pagination
    # POST /wp-admin/admin-ajax.php → JSON { html, has_more_posts }
    pagination:
      type: ajax_post
      endpoint: /wp-admin/admin-ajax.php
      start: 1
      page_param: paged
      body_params:
        action: houzez_loadmore_properties
        pagination_type: loadmore
        posts_limit: "12"
        card: v7
        post_status: all
      response_format: json_html
      html_field: html
      has_more_field: has_more_posts
      no_result_value: no_result

    delay_ms: 2000
    jitter_ms: 500
    max_items: 100
    max_pages: 10

    # Selectors for Houzez v9 card HTML (returned by AJAX)
    selectors:
      listing: ".item-listing-wrap"
      link: "a[href*='/property/']"
      title: "h2.item-title a"
      price: ".item-price .price"
      location: ".item-address span"
      image: "img.wp-post-image"

    price_format:
      currency_symbol: "€"
      thousands_separator: ","
      decimal_separator: "."

    id_prefix: "scv"

    detail:
      enabled: true
      policy: always
      delay_ms: 5000
      selectors:
        description: ".property-description p, .wpsight-listing-description p, [class*='description'] p"
        images: ".property-gallery img, .slick-slide img, .swiper-slide img, img.wp-post-image"
        price: ".item-price .price, .es-price"
      spec_patterns:
        bedrooms:
          - "(\\d+)\\s*(?:Bedrooms?|Beds?|Quartos?|Chambres?)"
          - "(?:Bedrooms?|Beds?|Quartos?)\\s*[:\\-]?\\s*(\\d+)"
          - "\\bT(\\d+)\\b"
          - "(?:T|Tipologia)\\s*(\\d+)"
          - "(\\d+)\\s*(?:dorm|assoalhada)"
        bathrooms:
          - "(\\d+)\\s*(?:Bathrooms?|Baths?|Banheiros?|Casas?\\s*de\\s*banho)"
          - "(?:Bathrooms?|Baths?)\\s*[:\\-]?\\s*(\\d+)"
        area:
          - "(\\d+(?:[.,]\\d+)?)\\s*(?:m[²2]|sqm|sq\\.?\\s*m|metros?\\s*quadrados?)"
          - "(?:area|size|superf[ií]cie|[aá]rea)\\s*[:\\-]?\\s*(\\d+(?:[.,]\\d+)?)\\s*(?:m[²2]|sqm|sq|$)"
      amenity_keywords:
        pool: ["pool", "piscina", "swimming"]
        sea_view: ["sea view", "vista mar", "ocean view"]
        balcony: ["balcony", "varanda"]
        garden: ["garden", "jardim"]
        air_conditioning: ["air conditioning", "ar condicionado", "a/c"]
        parking: ["parking", "garage", "estacionamento"]
        furnished: ["furnished", "mobilado"]

