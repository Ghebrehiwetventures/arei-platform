    fetch_method: headless  # AJAX-loaded content

    pagination:
      type: path_segment
      pattern: "/page/{page}/"
      start: 1
      first_no_param: true

    delay_ms: 3000
    jitter_ms: 500
    max_items: 200
    max_pages: 20

    selectors:
      listing: "article.property"
      link: "a.property__link"
      title: ".property__content h3"
      price: ".property__content p span:first-child"  # "Price: X €"
      location: ".property__content p:last-child"  # City name
      image: ".property__header img"

    price_format:
      currency_symbol: "€"
      thousands_separator: " "  # Uses non-breaking space

    id_prefix: "ecv"

    detail:
      enabled: true
      policy: always
      fetch_method: http
      delay_ms: 3000
      image_fallback: false
      selectors:
        description: ".pageContent__text p[data-start], .property__description p, .entry-content p, [class*='description'] p"
        images: "img.gallery__img, .property__gallery .swiper-slide img, .property__gallery .gallery img"
        # Price in detail pages: "Price: 479 491 €" format in spans
        price: ".property-info__price, .property__content p span:first-child"
      spec_table:
        container: ".property-summary__list table"
        label_selector: "td:first-child"
        value_selector: "+ td"
        label_map:
          area: ["total usable area", "celková užitná plocha", "area"]
          price: ["price"]
      spec_patterns:
        bedrooms:
          - "(\\d+|one|two|three|four|five|six|seven|eight|nine|ten)\\s+(?:\\w+\\s+){0,2}(?:en[- ]?suite|ensuite)\\s+Bedrooms?"
          - "(\\d+)\\s*(?:Bedrooms?|Beds?|Quartos?|Chambres?)"
          - "(?:Bedrooms?|Beds?|Quartos?)\\s*[:\\-]?\\s*(\\d+)"
          - "\\bT(\\d+)\\b"
          - "(?:T|Tipologia)\\s*(\\d+)"
          - "(\\d+)\\s*(?:dorm|assoalhada)"
        bathrooms:
          - "(\\d+|one|two|three|four|five|six|seven|eight|nine|ten)\\s*(?:full\\s+)?Bathrooms?"
          - "(\\d+)\\s*(?:Bathrooms?|Baths?|Banheiros?|Casas?\\s*de\\s*banho)"
          - "(?:Bathrooms?|Baths?)\\s*[:\\-]?\\s*(\\d+)"
        area:
          - "(\\d+(?:[.,]\\d+)?)\\s*(?:m[²2]|sqm|sq\\.?\\s*m|metros?\\s*quadrados?)"
          - "(?:area|size|superf[ií]cie|[aá]rea)\\s*[:\\-]?\\s*(\\d+(?:[.,]\\d+)?)\\s*(?:m[²2]|sqm|sq|$)"
      amenity_keywords:
        pool: ["pool", "piscina"]
        sea_view: ["sea view", "vista mar", "ocean view"]
        balcony: ["balcony", "varanda"]
        garden: ["garden", "jardim"]
        parking: ["parking", "garage"]

