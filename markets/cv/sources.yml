  # ============================================
  # NHAKAZA
  # Cape Verde's local property classifieds portal
  # Server-rendered content, JS-driven pagination (click_next + headless)
  # Prices in CVE (Cape Verdean Escudo): "35.000.000$00"
  # ============================================
  - id: cv_nhakaza
    name: "NhaKaza"
    url: https://nhakaza.cv/Comprar-Casa-Apartamento-Lojas-Escritorio/?view_page=buy&tp_to=2
    type: html
    lifecycleOverride: IN
    currency: CVE
    fetch_method: headless  # Pagination uses javascript:void(0) — requires Puppeteer

    pagination:
      type: click_next      # Next-page buttons are JS-driven, not URL-based
      next_selector: "ul.page_navigation li.page-item:last-child:not(.disabled) a.page-link"
                            # Last <li> in pagination = next button (no text, only flaticon-right-arrow icon)

    delay_ms: 3000
    jitter_ms: 1000
    max_items: 150
    max_pages: 10
    stop_condition: empty_listings

    selectors:
      listing: "div.feat_property.list"
      link: "a[href*='view_page=show_ad']"
      title: "h4"
      price: ".fp_price"
      image: ".thumb img"

    reject_url_patterns:
      - "/arrendar-"

    price_format:
      currency_symbol: "$"     # CVE escudo; "$NN" centavo suffix already stripped by parsePrice()
      thousands_separator: "." # "35.000.000$00" uses dots as thousands separators

    id_prefix: "nk"

    detail:
      enabled: true
      policy: always
      delay_ms: 3000
      image_fallback: false
      specs_selector: ".listing_single_description"
      selectors:
        description: "[class*='desc'] p, .listing_desc_header ~ div p"
        images: "section.listing-title-area.p0 img[src*='/med/']"
        bedrooms: "li:contains('Tipologia')"
        bathrooms: "li:contains('WC')"
      spec_patterns:
        bedrooms:
          - "Tipologia\\s*[:\\-]?\\s*T(\\d+)"
          - "\\bT(\\d+)\\b"
          - "(\\d+)\\s*(?:Quartos?|Bedrooms?)"
        bathrooms:
          - "WC\\s*[:\\-]?\\s*(\\d+)"
          - "(\\d+)\\s*(?:WC|Banheiros?|Casas?\\s*de\\s*banho)"
        area:
          - "(\\d+(?:[.,]\\d+)?)\\s*(?:m[²2]|sqm|metros?\\s*quadrados?)"
      amenity_keywords:
        pool: ["pool", "piscina"]
        sea_view: ["sea view", "vista mar", "ocean view"]
        parking: ["parking", "garagem", "estacionamento"]
        furnished: ["furnished", "mobilado", "mobilada"]
        balcony: ["balcony", "varanda", "terraço"]

  # ============================================
  # REMAX CAPE VERDE
  # Azure Cognitive Search backend (Gryphtech WebPlatform)
  # No HTML parsing — pipeline talks to the JSON API directly via the generic
  # json_api pagination type. Same pattern applies to every other REMAX market
  # (KE/NG/ZA/BW/ZM/UG/GH) — just clone this entry with a different country code.
  # ============================================
  - id: cv_remax
    name: "REMAX Cape Verde"
    url: https://www.remax.cv/search/listing-search/docs/search
    type: json_api
    lifecycleOverride: IN
    currency: EUR
    fetch_method: http

    pagination:
      type: json_api
      method: POST
      page_mode: skip          # Azure Search uses $skip/$top semantics
      page_size: 20
      page_field: skip
      size_field: top
      items_path: value
      count_path: "@odata.count"
      body:
        search: "*"
        # TransactionTypeUID 261 = Sale (260 = Rent). Without this clause the
        # search returns rental listings too, which would land in the for-sale feed.
        filter: "content/ListingCountryCode eq 'CV' and content/IsFindable eq true and content/TransactionTypeUID eq 261"
        count: true

    delay_ms: 1500
    jitter_ms: 500
    max_items: 100
    max_pages: 5

    id_prefix: "rmx"

    # item_map = field-level mapping from JSON hit → listing.
    # Dot-paths resolve inside content_base. Templates use {field} placeholders.
    item_map:
      content_base: content
      id: MLSID
      title:
        array: ListingDescriptions
        field: Description
        matches:
          - field: ISOLanguageCode
            equals: en
          - field: DescriptionTypeUID
            equals: "1113"
      title_fallbacks:
        - array: ListingMetaTags
          field: MetaTitle
          match_field: LanguageCode
          match_value: en-US
      price: ListingPriceEuro
      bedrooms: NumberOfBedrooms
      bathrooms: NumberOfBathrooms
      area_sqm: TotalArea
      location_template: "{City}, {Province}"

      # Hidden-price listings ("price upon request" on remax.cv) are kept with
      # price=null. The feed contract treats price as optional (FEED_CONTRACT.md
      # § "Launch decision") and ingest_to_curated writes price ?? null.

      # Prefer the English description, else any language (first match wins).
      description:
        array: ListingDescriptions
        field: Description
        match_field: ISOLanguageCode
        match_value: en

      # Prefer English ShortLink; prepend site origin.
      detail_url:
        array: ShortLinks
        field: ShortLink
        match_field: ISOLanguageCode
        match_value: en
        template: "https://www.remax.cv/{VALUE}"

      # Gryphtech REMAX CDN pattern: /userimages/{CountryID}/LargeWM/{FileName}
      # CountryID for CV is 73 (hardcoded in the tenant config).
      # No `limit` — REMAX's ListingImages is the agent's authoritative gallery,
      # so we keep every image. Engine default (100) is the only ceiling.
      # sort_by: Order — REMAX returns images in arbitrary array order; the
      # numeric `Order` field is the agent's intended display sequence (Order=1
      # is the hero/cover). Sorting here makes image_urls[0] match remax.cv.
      images:
        array: ListingImages
        field: FileName
        sort_by: Order
        template: "https://cdn.gryphtech.com/userimages/73/LargeWM/{VALUE}"

    # Listing detail is already complete from the search API — no HTML enrichment.
    detail:
      enabled: false

