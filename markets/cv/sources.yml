  # ============================================
  # CCORE INVESTMENTS
  # CasafariCRM / Proppy CRM - server-side rendered, no headless needed
  # Listing URL: /en/list?page=N   (English variant — list cards are translated)
  # Detail URL:  /property-detail/{slug}/{id}
  # The trailing numeric segment of the detail URL is the stable Proppy id —
  # we use id_url_pattern so the same listing resolves to the same row id
  # regardless of PT vs EN slug.
  # DOM: each listing is <a class="propertyItemStyle11"> - container IS the link
  # Images served from cdn.proppy.app CDN (no lazy loading, in HTML directly)
  # ============================================
  - id: cv_ccoreinvestments
    name: "CCore Investments"
    url: https://www.ccoreinvestments.com/en/list
    type: html
    lifecycleOverride: IN
    fetch_method: http  # Server-rendered HTML, no JS rendering required

    pagination:
      type: query_param
      param: "page"
      start: 1
      first_no_param: false  # Page 1 uses ?page=1 explicitly

    delay_ms: 2500
    jitter_ms: 1000
    max_items: 200
    max_pages: 15
    stop_condition: empty_listings

    # CasafariCRM (Proppy) DOM structure:
    # - Listing container = <a class="propertyItemStyle11"> (the anchor is the card)
    # - Price: "384 748 €" with non-breaking space (&#160;) as thousands separator
    selectors:
      listing: "a.propertyItemStyle11"
      # no `link` needed — container is the anchor, genericFetcher reads $container.attr("href")
      title: "h3.propertyItemStyle11__title"
      price: "span.propertyItemStyle11__price"
      location: "h4.propertyItemStyle11__subTitle"
      image: "img.propertyItemStyle11__img"

    price_format:
      currency_symbol: "€"
      thousands_separator: " "   # Covers both regular space and &#160; non-breaking space
      decimal_separator: ","

    id_prefix: "ccore"
    id_url_pattern: '/(\d+)(?:[/?#]|$)'
    # The /en/list cards link to /property-detail/ (Portuguese page); the actual
    # English detail page lives at /en/property-detail/. Rewrite to pin enrichment
    # to the English variant — descriptions land in English, bathroom counts
    # become regex-extractable ("1 Bathroom" vs PT "1 Casa de banho").
    detail_url_rewrite:
      from: '/property-detail/'
      to: '/en/property-detail/'

    detail:
      enabled: true
      policy: always
      delay_ms: 2500
      selectors:
        description: ".contentText, .js-cmsContent"
        # Target the dedicated property gallery only — avoids related-listing thumbnails
        # (`img.item__img`) and header logos elsewhere on the page.
        images: "#js-gallery__list img, .gallery__img"
        # detailsBar has bedrooms/bathrooms behind icons (no text labels), so the
        # body-text regex can't find them. Target the <span> next to each icon.
        # Single-unit pages show both; development pages show "Units: N" instead
        # and the selector simply doesn't match — bathrooms stays null, which is
        # the right answer for a project that spans multiple unit types.
        bedrooms: ".detailsBar__list i.fa-bed + span"
        bathrooms: ".detailsBar__list i.fa-shower + span"
        area: ".detailsBar__list i.proppy-icon-gross-area-24-custom + span, .detailsBar__list i.proppy-icon-home-32 + span"
      spec_patterns:
        bedrooms:
          - "(\\d+)\\s*(?:Bedrooms?|Beds?|Quartos?|Chambres?)"
          - "(?:Bedrooms?|Beds?|Quartos?)\\s*[:\\-]?\\s*(\\d+)"
          - "\\bT(\\d+)\\b"
          - "(?:T|Tipologia)\\s*(\\d+)"
        bathrooms:
          - "(\\d+)\\s*(?:Bathrooms?|Baths?|Banheiros?|Casas?\\s*de\\s*banho)"
          - "(?:Bathrooms?|Baths?)\\s*[:\\-]?\\s*(\\d+)"
        area:
          - "(\\d+(?:[.,]\\d+)?)\\s*(?:m[²2]|sqm|sq\\.?\\s*m|metros?\\s*quadrados?)"
          - "(?:area|size|superf[ií]cie|[aá]rea)\\s*[:\\-]?\\s*(\\d+(?:[.,]\\d+)?)\\s*(?:m[²2]|sqm|sq|$)"
      amenity_keywords:
        pool: ["pool", "piscina", "swimming"]
        sea_view: ["sea view", "vista mar", "ocean view"]
        balcony: ["balcony", "varanda"]
        garden: ["garden", "jardim"]
        air_conditioning: ["air conditioning", "ar condicionado", "a/c"]
        parking: ["parking", "garage", "estacionamento"]

